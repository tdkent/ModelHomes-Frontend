name: 'Test Application'
on: 
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore: 
      - ".github/workflows/*"
      - ".husky/**"
      - ".gitignore"
      - "README.md"
  
  workflow_dispatch:
    
jobs:
  lint:
    runs-on: 'ubuntu-latest'
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: ~/.npm
          # Creates a new key when package-lock.json is updated
          # When a new key is found, GHA will update the cache
          key: deps-node-module-${{ hashFiles('**/package-lock.json') }}
      
      - name: Install deps
        run: npm ci
      
      - name: Lint code
        run: npm run lint

      - name: Test code
        run: npm run test
